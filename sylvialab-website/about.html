  function renderKeywords(lang) {
    const el = document.getElementById('keyword-row');
    el.innerHTML = KEYWORDS.map(k => `<span class="keyword-chip">${k[lang]}</span>`).join('');
  }

  function renderEducation(lang) {
    const el = document.getElementById('education-list');
    el.innerHTML = EDUCATION.map(i => `
      <div class="timeline-item">
        <div class="timeline-year">${i.year[lang]}</div>
        <div class="timeline-title">${i.title[lang]}</div>
        <div class="timeline-org">${i.org[lang]}</div>
      </div>`).join('');
  }

  function renderExpertise(lang) {
    const el = document.getElementById('expertise-list');
    el.innerHTML = EXPERTISE.map(i => `
      <div class="expertise-item">
        <div class="expertise-tag">${i.tag}</div>
        <div class="expertise-name">${i.name[lang]}</div>
      </div>`).join('');
  }

  function renderCareer(lang) {
    const el = document.getElementById('career-list');
    el.innerHTML = CAREER.map(i => `

        <div class="timeline-title">${i.title[lang]}</div>
        <div class="timeline-org">${i.org[lang]}</div>
      </div>`).join('');
  }

  function renderPublications(lang) {
    const el = document.getElementById('publications-list');
    el.innerHTML = PUBLICATIONS.map((i, idx) => `
      <div class="pub-item">
        <div class="pub-num">${String(idx + 1).padStart(2, '0')}</div>
        <div class="pub-title">${i.title[lang]}</div>
        <div class="pub-venue">${i.venue[lang]}</div>
      </div>`).join('');
  }

  function renderFocus(lang) {
    const el = document.getElementById('focus-list');
    el.innerHTML = FOCUS.map(i => `<div class="focus-item">${i.text[lang]}</div>`).join('');
  }

  function renderPrograms(lang) {
    const el = document.getElementById('programs-list');
    el.innerHTML = PROGRAMS.map(i => `
      <div class="program-card">
        <div class="program-icon">${i.icon}</div>
        <div class="program-title">${i.title[lang]}</div>
        <div class="program-body">${i.body[lang]}</div>
      </div>`).join('');
  }

  function renderSimpleList(listId, data, lang) {
    const el = document.getElementById(listId);
    el.innerHTML = data.map(i => `
      <div class="item">
        <div class="year">${typeof i.year === 'string' ? i.year : i.year[lang]}</div>
        <div class="title">${i.title[lang]}</div>
      </div>`).join('');
  }

  function applyLang(lang) {
    document.documentElement.lang = lang;
    const dict = I18N[lang];
    if (!dict) return;

    document.body.classList.add('lang-switching');
    setTimeout(() => {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const val = dict[key];
        if (val === undefined) return;
        if (el.getAttribute('data-i18n-html') === 'true') {
          el.innerHTML = val;
        } else {
          el.textContent = val;
        }
      });

      renderKeywords(lang);
      renderEducation(lang);
      renderExpertise(lang);
      renderCareer(lang);
      renderPublications(lang);
      renderFocus(lang);
      renderPrograms(lang);
      renderSimpleList('teaching-ux-list', TEACHING_UX, lang);
      renderSimpleList('teaching-py-list', TEACHING_PY, lang);
      renderSimpleList('speaking-future-list', SPEAKING_FUTURE, lang);
      renderSimpleList('speaking-blockchain-list', SPEAKING_BLOCKCHAIN, lang);

      const titles = {
        ko: "소개 — 강희주",
        en: "About — Hee Ju Kang",
        zh: "关于 — 姜希周"
      };
      document.title = titles[lang];

      document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === lang);
      });

      localStorage.setItem('lang', lang);
      document.body.classList.remove('lang-switching');
    }, 180);
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => applyLang(btn.dataset.lang));
  });

  const savedLang = localStorage.getItem('lang') || 'ko';
  applyLang(savedLang);

  function updateClock() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const clockEl = document.getElementById('clock');
    if (clockEl) clockEl.textContent = `SEOUL ${hh}:${mm}`;
  }
  updateClock();
  setInterval(updateClock, 30000);

  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
</script>
