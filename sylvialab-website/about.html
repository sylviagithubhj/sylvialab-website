  const EXPERIENCE = [
    { year: { ko: "2024 — 현재", en: "2024 — Present", zh: "2024 — 至今" },
      title: { ko: "홍익대학교 국제디자인전문대학원 (IDAS)", en: "Hongik University IDAS", zh: "弘益大学国际设计专门大学院" },
      role: { ko: "박사과정", en: "Ph.D. Candidate", zh: "博士研究生" } },
    { year: { ko: "2023 — 현재", en: "2023 — Present", zh: "2023 — 至今" },
      title: { ko: "부산과학기술대학교", en: "Busan Institute of Science and Technology", zh: "釜山科学技术大学" },
      role: { ko: "겸임교수", en: "Adjunct Professor", zh: "客座教授" } }
  ];

  const PUBLICATIONS = [
    { title: { ko: "(추후 논문 제목을 이곳에 추가하세요)", en: "(Add your paper titles here)", zh: "(在此处添加论文标题)" },
      venue: "TBD" }
  ];

  const SPEAKING = [
    { year: "2026",
      title: { ko: "(강연 제목을 이곳에 추가하세요)", en: "(Add talk titles here)", zh: "(在此处添加演讲标题)" },
      org: { ko: "주최자", en: "Host", zh: "主办方" } }
  ];

  function renderExperience(lang) {
    const el = document.getElementById('experience-list');
    el.innerHTML = EXPERIENCE.map(item => `
      <div class="timeline-item">
        <div class="timeline-year">${item.year[lang]}</div>
        <div class="timeline-title">${item.title[lang]}</div>
        <div class="timeline-org">${item.role[lang]}</div>
      </div>
    `).join('');
  }

  function renderPublications(lang) {
    const el = document.getElementById('publications-list');
    el.innerHTML = PUBLICATIONS.map((item, i) => `
      <div class="pub-item">
        <div class="pub-num">${String(i + 1).padStart(2, '0')}</div>
        <div class="pub-title">${item.title[lang]}</div>
        <div class="pub-venue">${item.venue}</div>
      </div>
    `).join('');
  }

  function renderSpeaking(lang) {
    const el = document.getElementById('speaking-list');
    el.innerHTML = SPEAKING.map(item => `
      <div class="timeline-item">
        <div class="timeline-year">${item.year}</div>
        <div class="timeline-title">${item.title[lang]}</div>
        <div class="timeline-org">${item.org[lang]}</div>
      </div>
    `).join('');
  }

  function applyLang(lang) {
    document.documentElement.lang = lang;
    const dict = I18N[lang];
    if (!dict) return;

    document.body.classList.add('lang-switching');
    setTimeout(() => {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const val = dict[key];
        if (val === undefined) return;
        if (el.getAttribute('data-i18n-html') === 'true') {
          el.innerHTML = val;
        } else {
          el.textContent = val;
        }
      });

      renderExperience(lang);
      renderPublications(lang);
      renderSpeaking(lang);

      const titles = {
        ko: "소개 — 강희주",
        en: "About — Hee Ju Kang",
        zh: "关于 — 姜希周"
      };
      document.title = titles[lang];

      document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === lang);
      });

      localStorage.setItem('lang', lang);
      document.body.classList.remove('lang-switching');
    }, 180);
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => applyLang(btn.dataset.lang));
  });

  const savedLang = localStorage.getItem('lang') || 'ko';
  applyLang(savedLang);

  function updateClock() {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const clockEl = document.getElementById('clock');
    if (clockEl) clockEl.textContent = `SEOUL ${hh}:${mm}`;
  }
  updateClock();
  setInterval(updateClock, 30000);

  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
</script>
