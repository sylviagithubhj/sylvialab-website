    zh: {

      "nav.conference": "大会",
      "nav.mentorship": "辅导",

      "nav.workshop": "工作坊",
      "nav.writing": "文章",

      "teach.num": "§ 教学档案",

    }

  const ARCHIVE_DATA = [
    { num: "014", cat: { ko: "디자인", en: "Design", zh: "设计" }, year: "2026",
      url: "https://brunch.co.kr/@sylviasolution/184",
      title: { ko: "디자인 시스템 속도 <em>1000%</em> 올려주는 피그마 플러그인", en: "The Figma plugin that makes your design system <em>10× faster</em>", zh: "让设计系统速度提升 <em>10 倍</em>的 Figma 插件" } },
    { num: "013", cat: { ko: "마케팅", en: "Marketing", zh: "市场营销" }, year: "2025",
      title: { ko: "기술 창업자를 위한 마케팅 기초", en: "Marketing fundamentals for technical founders", zh: "给技术型创业者的市场营销基础" } },
    { num: "012", cat: { ko: "AI · 연구", en: "AI / Research", zh: "AI · 研究" }, year: "2025",
      title: { ko: "Physical AI 입문", en: "An introduction to Physical AI", zh: "具身智能入门" } },
    { num: "011", cat: { ko: "커리어", en: "Career", zh: "职业" }, year: "2025",
      url: "https://brunch.co.kr/@sylviasolution/170",
      title: { ko: "주니어 디자이너를 위한 <em>포트폴리오 디자인</em>", en: "<em>Portfolio design</em> for junior designers", zh: "给初级设计师的 <em>作品集设计</em>" } },
    { num: "010", cat: { ko: "커뮤니케이션", en: "Communication", zh: "沟通" }, year: "2025",
      title: { ko: "당신의 연구를 이야기로 전달하는 법", en: "How to tell the story of your research", zh: "如何讲述你的研究故事" } },
    { num: "009", cat: { ko: "AI · 연구", en: "AI / Research", zh: "AI · 研究" }, year: "2025",
      title: { ko: "HRI 101 · 하루짜리 워크숍", en: "HRI 101 · a one-day workshop", zh: "HRI 101 · 一日工作坊" } }
  ];

  function renderArchive(lang) {
    const tbody = document.getElementById('archive-body');
    tbody.innerHTML = ARCHIVE_DATA.map(item => `
      <tr${item.url ? ` data-url="${item.url}"` : ''}>
        <td class="archive-num">${item.num}</td>
        <td class="archive-title-cell">${item.title[lang]}</td>
        <td><span class="archive-cat">${item.cat[lang]}</span></td>
        <td class="archive-year">${item.year}</td>
        <td class="archive-arrow"><iconify-icon icon="solar:arrow-right-up-linear"></iconify-icon></td>
      </tr>
    `).join('');
    tbody.querySelectorAll('tr[data-url]').forEach(tr => {
      tr.addEventListener('click', () => {
        window.open(tr.dataset.url, '_blank', 'noopener');
      });
    });
  }

  function applyLang(lang) {
    document.documentElement.lang = lang;
    const dict = I18N[lang];
    if (!dict) return;
    document.body.classList.add('lang-switching');
    setTimeout(() => {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const val = dict[key];
        if (val === undefined) return;
        if (el.getAttribute('data-i18n-html') === 'true') el.innerHTML = val;
        else el.textContent = val;
      });
      renderArchive(lang);
      const titles = { ko: "아카이브 · 강희주", en: "Archive · Hee Ju Kang", zh: "档案 · 姜希周" };
      document.title = titles[lang];
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      try { localStorage.setItem('site-lang', lang); } catch(e) {}
      document.body.classList.remove('lang-switching');
    }, 180);
  }

  function detectInitialLang() {
    try {
      const saved = localStorage.getItem('site-lang');
      if (saved && I18N[saved]) return saved;
    } catch(e) {}
    const browser = (navigator.language || 'en').toLowerCase();
    if (browser.startsWith('ko')) return 'ko';
    if (browser.startsWith('zh')) return 'zh';
    return 'en';
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => applyLang(btn.dataset.lang));
  });
  applyLang(detectInitialLang());

  function updateClock() {
    const seoul = new Intl.DateTimeFormat('en-US', {
      timeZone: 'Asia/Seoul', hour: '2-digit', minute: '2-digit', hour12: false
    }).format(new Date());
    document.getElementById('clock').textContent = `SEL · ${seoul} KST`;
  }
  updateClock();
  setInterval(updateClock, 30000);

  const navToggle = document.getElementById('nav-toggle');
  const navLinks = document.getElementById('nav-links');
  if (navToggle && navLinks) {
    navToggle.addEventListener('click', () => {
      const open = document.body.classList.toggle('nav-open');
      navToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    navLinks.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        document.body.classList.remove('nav-open');
        navToggle.setAttribute('aria-expanded', 'false');
      });
    });
  }

  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));
</script>
